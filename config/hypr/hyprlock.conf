# BACKGROUND
background {
    monitor =
    path = ~/wallpapers/.current-blurred.jpg   
    #color = $background
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# GENERAL
general {
    no_fade_in = true
    no_fade_out = true
    hide_cursor = false
    grace = 0
    disable_loading_bar = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 1
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(92, 64, 69, 0)
    inner_color = rgba(92, 64, 69, 0.2)
    font_color = $foreground
    fade_on_empty = false
    rounding = -1
    font_color = rgb(230,230,230)
    inner_color = rgba(255,255,255,0.15)
    outer_color = rgba(255,255,255,0.4)
    fail_color = rgb(255,80,80)
    check_color = rgb(255, 0, 0)
    placeholder_text = <i><span foreground="##cdd6f4">Input Password...</span></i>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
    font_family = JetBrains Mono
}

# DATE
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgba(255, 255, 255, 0.75)
  font_size = 22
  font_family = JetBrains Mono Extrabold
  position = 0, 300
  halign = center
  valign = center
}

# TIME
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%-H:%M")"
  color = rgba(255, 255, 255, 0.75)
  font_size = 95
  font_family = JetBrains Mono Extrabold
  position = 0, 200
  halign = center
  valign = center
}



