monitor = , preferred, auto, 1

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$browser = firefox
$masanger = Telegram
$record = wf-recorder
$ide = pycharm
$music = spotify-launcher
$note = obsidian
$scrPath = ~/Изображения/Screenshots

# Исправление мерцания и артефактов Nvidia
env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

exec-once = swww-daemon
exec-once = wal -R -n
exec-once = ~/.local/bin/start-quickshell.sh
exec-once = swaync
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = mpd-mpris
exec-once = kdeconnect-indicator
exec-once = hyprlock
exec-once = wl-paste --type text --watch cliphist store # Запоминает текст
exec-once = wl-paste --type image --watch cliphist store # Запоминает картинки

general {
    gaps_in = 6
    gaps_out = 8
    border_size = 1
    col.active_border = rgb(585b70)
    col.inactive_border = rgb(2a2b36)
    layout = dwindle
    }

decoration {
    rounding = 16
    
    active_opacity = 1
    inactive_opacity = 0.8
    
    dim_inactive = true
    dim_strength = 0.04
    
    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000040)
        offset = 0 6
    }
    
    blur {
        enabled = true
        size = 7
        passes = 3
        ignore_opacity = true
        new_optimizations = true
        special = true
        popups = true
        xray = false
    
        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    bezier = bounce, 0.0, 1.25, 0.15, 1.0
    bezier = buttery, 0.1, 1.15, 0.15, 1.02
    bezier = smooth, 0.0, 0.0, 0.12, 1.0
    bezier = linear, 0.0, 0.0, 1.0, 1.0

    animation = windowsIn, 1, 4.5, bounce, slide
    animation = windowsOut, 1, 3.5, smooth, slide
    animation = windowsMove, 1, 4, buttery, slide

    animation = fadeIn, 1, 3.5, smooth
    animation = fadeOut, 1, 3, smooth
    animation = fadeDim, 1, 4, smooth
    animation = fadeShadow, 1, 4, smooth

    animation = workspaces, 1, 4.5, buttery, slidefade 10%    
    animation = specialWorkspace, 1, 4.5, buttery, slidefadevert -15%

    animation = border, 1, 7, smooth
    animation = borderangle, 1, 35, linear, loop

    animation = layersIn, 1, 4, bounce, slide
    animation = layersOut, 1, 3, smooth, slide
}

input {
    kb_layout = us, ru
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}
dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vrr = 1
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}

cursor {
    inactive_timeout = 3
}

###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, B, exec, $browser
#bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager

bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, F, fullscreen,
bind = $mainMod, I, exec, $ide  
bind = $mainMod, SPACE, exec, quickpreview #предпросмотр в thunar(мб удалю)

#binds of programms
bind = $mainMod, U, exec, $masanger
bind = $mainMod, Y, exec, $music
bind = $mainMod, O, exec, $note

# Volume bind штуки с fn
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#move window
bind = SUPER SHIFT, A, movewindow, l
bind = SUPER SHIFT, D, movewindow, r
bind = SUPER SHIFT, W, movewindow, u
bind = SUPER SHIFT, S, movewindow, d
bind = $mainMod SHIFT, right, resizeactive, 30 0
bind = $mainMod SHIFT, left, resizeactive, -30 0
bind = $mainMod SHIFT, up, resizeactive, 0 -30
bind = $mainMod SHIFT, down, resizeactive, 0 30

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, N, togglespecialworkspace, magic
bind = $mainMod SHIFT, N, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness штуки с fn
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl штуки с fn
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previousa

bind = $mainMod SHIFT, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# ---------- Additional binds from other config ----------
# (уникальные сочетания, которых не было в твоём файле)
bind = $mainMod, R, exec, qs ipc call launcher toggle
bind = $mainMod, W, exec, qs ipc call wallpaper toggle
bind = $mainMod, A, exec, qs ipc call dashboard toggle
bind = $mainMod, M, exec, qs ipc call music toggle
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev
bind = $mainMod, S, togglespecialworkspace
#bind = $mainMod, C, exec, grim ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"
#bind = $mainMod SHIFT, C, exec, grim -g "$(slurp)" ~/screenshots/$(date +%Y-%m-%d_%H-%M-%S).png && notify-send "Screenshot Saved"
bind = , Menu, exec, ~/.config/scripts/define.sh
#binde = , F1, exec, amixer set Master toggle
#binde = , F2, exec, amixer set Master 1%-
#binde = , F3, exec, amixer set Master 1%+
#binde = , XF86AudioMute, exec, amixer set Master toggle
#binde = , XF86AudioLowerVolume, exec, amixer set Master 1%-
#binde = , XF86AudioRaiseVolume, exec, amixer set Master 1%+
bind = $mainMod, G, exec, gpu-screen-recorder -w screen -f 30 -a default_output -o ~/Изображения/screen-recordings/$(date +%Y-%m-%d_%H-%M-%S).mp4 & notify-send "Recording Started"
bind = $mainMod SHIFT, G, exec, killall -SIGINT gpu-screen-recorder && notify-send "Recording Stopped"
bind = $mainMod SHIFT, C, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > $scrPath/$(date +%F_%T).png # скриншот области 
bind = $mainMod, C, exec, grim - | wl-copy && wl-paste > $scrPath/$(date +%F_%T).png & notify-send "Screenshot Saved" -t 1000 # скриншот всего экрана 
bind = $mainMod ALT, W, exec, ~/.config/scripts/random-wallpaper.sh
bind = $mainMod ALT, R, exec, $menu

windowrule = match:class Lorien, opacity 0.8 1
windowrule = match:class sublime_text, opacity 0.88 1
windowrule = match:class thunar, opacity 0.9 1
windowrule = match:class Thunar, opacity 0.9 1
windowrule = match:class VSCodium, opacity 0.88 1
windowrule = match:class codium, opacity 0.88 1
windowrule = match:class org.pwmt.zathura, opacity 0.9 1
windowrule = match:class firefox, opacity 1.0 1.0



windowrule = match:class mpv, float on
windowrule = match:class mpv, size 640 360
windowrule = match:class mpv, center on
windowrule = match:class mpv, opacity 1.0 1.0

windowrule = match:float yes, center on

windowrule = match:class scratchterm, float on
windowrule = match:class scratchterm, size 85% 70%
windowrule = match:class scratchterm, center on


layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window

layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window

layerrule = blur on, match:namespace quickshell
layerrule = ignore_alpha 0, match:namespace quickshell


